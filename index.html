<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A* Pathfinding</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            background: #0f0f0f;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .header{
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            max-width: 1600px;
            margin-bottom: 16px;
        }
        h1{
            color: #e0e0e0;
            font-weight: 700;
            font-size: 22px;
            letter-spacing: -0.3px;
        }
        .controls{
            display: flex;
            gap: 10px;
        }
        .controls button{
            padding: 9px 20px;
            border: none;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn-wall{
            background: #2a2a2a;
            color: #e0e0e0;
        }
        .btn-wall:hover{
            background: #3a3a3a;
        }
        .btn-reset{
            background: #3a1a1a;
            color: #e0e0e0;
        }
        .btn-reset:hover{
            background: #4a2a2a;
        }
        .legend{
            display: flex;
            gap: 18px;
            margin-bottom: 12px;
            align-items: center;
            width: 100%;
            max-width: 1600px;
        }
        .legend-item{
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: #a0a0a0;
            font-weight: 400;
        }
        .legend-color{
            width: 14px;
            height: 14px;
            border-radius: 3px;
            border: 1px solid #333;
        }
        #defaultCanvas0{
            border-radius: 6px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>A* Pathfinding</h1>
        <div class="controls">
            <button class="btn-wall" onclick="generateWalls()">Generate Wall</button>
            <button class="btn-reset" onclick="resetSimulation()">Reset</button>
        </div>
    </div>

    <div class="legend">
        <div class="legend-item">
            <div class="legend-color" style="background:#ffff00;"></div>
            Start
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background:#ffa500;"></div>
            Finish
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background:#00ff00;"></div>
            Open Set
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background:#ff0000;"></div>
            Closed Set
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background:#0000ff;"></div>
            Path
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background:#000000; border-color:#555;"></div>
            Wall
        </div>
    </div>

    <script src="./p5.min.js"></script>
    <script src="./main.js"></script>
</body>
</html>
